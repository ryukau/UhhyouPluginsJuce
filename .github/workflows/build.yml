on:
  workflow_dispatch:
  push:
    branches:
      - "develop"
    tags:
      - "*"

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.set-matrix.outputs.plugins }}
    steps:
      - uses: actions/checkout@v6
      - name: Generate Matrix from Directories
        id: set-matrix
        run: |
          python -c '
          import os, json
          plugins = []
          for folder in ["plugins", "experimental"]:
              if os.path.exists(folder):
                  plugins.extend([d for d in os.listdir(folder) if os.path.isdir(os.path.join(folder, d)) and not d.startswith(".")])
          print(f"plugins={json.dumps(plugins)}")
          ' >> $GITHUB_OUTPUT

  build-ubuntu:
    needs: setup-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJSON(needs.setup-matrix.outputs.plugins) }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Run script
      run: ci/ci_ubuntu.sh ${{ matrix.plugin }}
    - name: Upload
      uses: actions/upload-artifact@v6
      with:
        name: plugins_ubuntu_${{ matrix.plugin }}
        path: plugins_ubuntu

  build-windows:
    needs: setup-matrix
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJSON(needs.setup-matrix.outputs.plugins) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Run script
        run: ci/ci_windows.ps1 -Plugin ${{ matrix.plugin }}
      - name: Upload
        uses: actions/upload-artifact@v6
        with:
          name: plugins_windows_${{ matrix.plugin }}
          path: plugins_windows

  build-macOS:
    needs: setup-matrix
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJSON(needs.setup-matrix.outputs.plugins) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Run script
        run: ci/ci_macOS.sh ${{ matrix.plugin }}
      - name: Upload
        uses: actions/upload-artifact@v6
        with:
          name: plugins_macOS_${{ matrix.plugin }}
          path: plugins_macOS

  release-packaging:
    needs: [build-ubuntu, build-windows, build-macOS]
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/UhhyouPluginsJuce') }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/linux
          pattern: plugins_ubuntu_*
          merge-multiple: true

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/windows
          pattern: plugins_windows_*
          merge-multiple: true

      - name: Download macOS Artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/macos
          pattern: plugins_macOS_*
          merge-multiple: true

      - name: Prepare Packages
        run: |
          mkdir -p dist/linux/assets dist/windows/assets dist/macos/assets
          cp -r assets/UhhyouPlugins dist/linux/assets/
          cp -r assets/UhhyouPlugins dist/windows/assets/
          cp -r assets/UhhyouPlugins dist/macos/assets/

          find dist/windows -name "*.exp" -type f -delete
          find dist/windows -name "*.lib" -type f -delete

          cd dist/linux && zip -r ../../UhhyouPlugins_Linux.zip .
          cd ../windows && zip -r ../../UhhyouPlugins_Windows.zip .
          cd ../macos && zip -r ../../UhhyouPlugins_macOS.zip .

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            UhhyouPlugins_Linux.zip \
            UhhyouPlugins_Windows.zip \
            UhhyouPlugins_macOS.zip \
            --title "$GITHUB_REF_NAME" \
            --notes-from-tag
